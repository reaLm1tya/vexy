name: Build Telegram iOS (IPA)

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write  # required for creating releases and uploading assets

jobs:
  build:
    runs-on: macos-15-large  # more CPU = faster; Xcode 26.2 (see versions.json)

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set active Xcode path
        run: |
          XCODE_VERSION=$(cat versions.json | python3 -c 'import json,sys;obj=json.load(sys.stdin);print(obj["xcode"]);')
          sudo xcode-select -s /Applications/Xcode_$XCODE_VERSION.app/Contents/Developer
          xcodebuild -version

      - name: Create canonical source directory
        run: |
          set -x
          sudo mkdir -p /Users/Shared
          cp -R $GITHUB_WORKSPACE /Users/Shared/
          mv /Users/Shared/$(basename $GITHUB_WORKSPACE) /Users/Shared/telegram-ios

      - name: Cache Bazel
        uses: actions/cache@v4
        with:
          path: /private/var/tmp/_bazel_containerhost
          key: bazel-telegram-ios-${{ runner.os }}-${{ hashFiles('MODULE.bazel', 'versions.json', '.gitmodules') }}
          restore-keys: |
            bazel-telegram-ios-${{ runner.os }}-

      - name: Build the App
        run: |
          set -x

          SOURCE_DIR=/Users/Shared/telegram-ios
          BAZEL_USER_ROOT="/private/var/tmp/_bazel_containerhost"

          cd $SOURCE_DIR

          BUILD_NUMBER_OFFSET="$(cat build_number_offset)"
          export APP_VERSION=$(cat versions.json | python3 -c 'import json,sys;obj=json.load(sys.stdin);print(obj["app"]);')
          export COMMIT_COUNT=$(git rev-list --count HEAD)
          export COMMIT_COUNT="$(($COMMIT_COUNT+$BUILD_NUMBER_OFFSET))"
          export BUILD_NUMBER="$COMMIT_COUNT"
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV
          echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV

          python3 build-system/Make/ImportCertificates.py --path build-system/fake-codesigning/certs
          python3 -u build-system/Make/Make.py \
            --bazelUserRoot="$BAZEL_USER_ROOT" \
            build \
            --configurationPath="build-system/appstore-configuration.json" \
            --codesigningInformationPath=build-system/fake-codesigning \
            --configuration=release_arm64 \
            --buildNumber="$BUILD_NUMBER" \
            --outputBuildArtifactsPath=build/artifacts

      - name: Copy artifacts to workspace for release
        run: |
          mkdir -p $GITHUB_WORKSPACE/build/artifacts
          cp /Users/Shared/telegram-ios/build/artifacts/Telegram.ipa $GITHUB_WORKSPACE/build/artifacts/
          cp /Users/Shared/telegram-ios/build/artifacts/Telegram.DSYMs.zip $GITHUB_WORKSPACE/build/artifacts/

      - name: Upload IPA and DSYMs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Telegram-iOS-build-${{ env.BUILD_NUMBER }}
          path: |
            build/artifacts/Telegram.ipa
            build/artifacts/Telegram.DSYMs.zip

      - name: Create Release and upload IPA
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: build-${{ env.BUILD_NUMBER }}
          name: Telegram ${{ env.APP_VERSION }} (${{ env.BUILD_NUMBER }})
          body: |
            Build of Telegram for iOS ${{ env.APP_VERSION }} (${{ env.BUILD_NUMBER }}).
            Uses official Telegram API (api.telegram.org). IPA is signed with CI certificates; for device installation re-sign with your Apple Developer profile.
          draft: false
          prerelease: false
          files: |
            build/artifacts/Telegram.ipa
            build/artifacts/Telegram.DSYMs.zip
